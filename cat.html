<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫咪找家大冒险</title>
    <meta name="description" content="帮助可爱的小猫咪找到回家的路，适合小朋友的益智游戏，包含数学和字母学习">
    <link rel="stylesheet" href="cat.css">
    <script src="auth.js"></script>
    <script>
        let game = null;
        let gameProgress_ = null;
        const GAME_NAME = 'cat';
        let lastSaveTime = 0;

        async function loadGameProgress_() {
            if (!window.auth.getUserId()) return;
            gameProgress_ = new window.GameProgress(GAME_NAME);
            const saved = await gameProgress_.load();
            if (saved && game) {
                if (saved.level) {
                    document.getElementById('level').textContent = saved.level;
                }
                if (saved.score) {
                    document.getElementById('score').textContent = saved.score;
                }
            }
        }

        async function saveGameProgress_() {
            if (!window.auth.getUserId() || !gameProgress_ || !game) return;
            await gameProgress_.save({
                level: game.currentLevel || 1,
                score: game.score || 0
            });
        }

        function initGame_() {
            game = new CatGame();
            loadGameProgress_();
            
            setInterval(() => {
                if (game && game.gameState === 'playing' && window.auth.getUserId()) {
                    const now = Date.now();
                    if (now - lastSaveTime > 10000) {
                        saveGameProgress_();
                        lastSaveTime = now;
                    }
                }
            }, 10000);
        }
    </script>
</head>
<body>
    <div class="auth-bar">
        <div id="auth-status"></div>
    </div>
    <div class="game-container">
        <!-- 游戏头部 -->
        <header class="game-header">
            <div class="header-left">
                <a href="index.html" class="back-btn">🏠</a>
                <h1>🐱 猫咪找家大冒险</h1>
            </div>
            <div class="header-right">
                <div class="score-display">
                    <span class="star">⭐</span>
                    <span id="score">0</span>
                </div>
                <div class="step-display">
                    <span class="step-icon">👣</span>
                    <span id="stepCount">0</span>
                </div>
                <div class="level-display">
                    <span>关卡</span>
                    <span id="level">1</span>
                </div>
            </div>
        </header>

        <!-- 游戏主区域 -->
        <main class="game-main">
            <!-- 开始界面 -->
            <div id="startScreen" class="screen start-screen">
                <div class="start-content">
                    <div class="cat-mascot">🐱</div>
                    <h2>猫咪找家大冒险</h2>
                    <p class="story">小猫咪迷路了，你能帮助它找到回家的路吗？</p>

                    <!-- 难度选择 -->
                    <div class="difficulty-selector">
                        <h3>选择难度</h3>
                        <div class="difficulty-options">
                            <button class="difficulty-btn" data-difficulty="easy">
                                <span class="difficulty-icon">🌱</span>
                                <span class="difficulty-name">简单</span>
                                <span class="difficulty-desc">适合初学者</span>
                            </button>
                            <button class="difficulty-btn active" data-difficulty="medium">
                                <span class="difficulty-icon">🌿</span>
                                <span class="difficulty-name">中等</span>
                                <span class="difficulty-desc">有挑战性</span>
                            </button>
                            <button class="difficulty-btn" data-difficulty="hard">
                                <span class="difficulty-icon">🌳</span>
                                <span class="difficulty-name">高阶</span>
                                <span class="difficulty-desc">大师级别</span>
                            </button>
                        </div>
                    </div>

                    <!-- 关卡选择 -->
                    <div class="level-selector">
                        <h3>选择关卡</h3>
                        <div id="levelGrid" class="level-grid">
                            <!-- 动态生成关卡按钮 -->
                        </div>
                    </div>

                    <div class="features">
                        <div class="feature">
                            <span class="feature-icon">🔢</span>
                            <span>数学学习</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🔤</span>
                            <span>字母认知</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🎨</span>
                            <span>颜色配对</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">⭐</span>
                            <span>收集星星</span>
                        </div>
                    </div>
                    <button id="startBtn" class="btn btn-primary">
                        <span class="btn-icon">▶️</span>
                        开始游戏
                    </button>
                </div>
            </div>

            <!-- 游戏画布 -->
            <div id="gameScreen" class="screen game-screen hidden">
                <canvas id="gameCanvas"></canvas>
                
                <!-- 游戏UI覆盖层 -->
                <div class="game-ui">
                    <div id="messageBox" class="message-box hidden">
                        <div class="message-content">
                            <span id="messageIcon">💝</span>
                            <p id="messageText">太棒了！</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 谜题弹窗 -->
            <div id="puzzleModal" class="puzzle-modal hidden">
                <div class="puzzle-content">
                    <div class="puzzle-header">
                        <span id="puzzleTypeIcon" class="puzzle-type-icon">🔢</span>
                        <h3>解答谜题</h3>
                        <button id="closePuzzleBtn" class="close-btn">✕</button>
                    </div>
                    <div class="puzzle-body">
                        <div class="question-container">
                            <p id="puzzleQuestion" class="puzzle-question">1 + 2 = ?</p>
                            <button id="playAudioBtn" class="play-audio-btn" title="播放题目">
                                <span class="play-icon">🔊</span>
                                <span class="play-text">播放</span>
                            </button>
                        </div>
                        <div id="puzzleOptions" class="puzzle-options">
                            <button class="answer-option" data-answer="2">2</button>
                            <button class="answer-option" data-answer="3">3</button>
                            <button class="answer-option" data-answer="4">4</button>
                        </div>
                        <div id="hintText" class="hint-text hidden"></div>
                    </div>
                    <div class="puzzle-footer">
                        <button id="hintBtn" class="btn btn-hint">💡 提示</button>
                    </div>
                </div>
            </div>

            <!-- 关卡完成界面 -->
            <div id="levelCompleteScreen" class="screen level-complete-screen hidden">
                <div class="complete-content">
                    <div class="celebration">
                        <span class="celebration-emoji">🎉</span>
                        <span class="celebration-emoji">🌟</span>
                        <span class="celebration-emoji">🎊</span>
                    </div>
                    <h2>关卡完成！</h2>
                    <div class="stars-earned">
                        <span class="star earned">⭐</span>
                        <span class="star earned">⭐</span>
                        <span class="star earned">⭐</span>
                    </div>
                    <p class="encouragement">你真棒！小猫咪很开心！</p>
                    <div class="complete-buttons">
                        <button id="nextLevelBtn" class="btn btn-primary">下一关 ▶️</button>
                        <button id="replayBtn" class="btn btn-secondary">再玩一次 🔄</button>
                    </div>
                </div>
            </div>

            <!-- 游戏完成界面 -->
            <div id="gameCompleteScreen" class="screen game-complete-screen hidden">
                <div class="complete-content">
                    <div class="cat-family">
                        <span class="family-cat">🐱</span>
                        <span class="family-cat">🐱</span>
                        <span class="family-cat">🐱</span>
                    </div>
                    <h2>恭喜通关！</h2>
                    <p class="story">小猫咪终于回到了温暖的家！</p>
                    <div class="final-stats">
                        <div class="stat-item">
                            <span class="stat-label">总分数</span>
                            <span id="finalScore" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">收集星星</span>
                            <span id="totalStars" class="stat-value">0</span>
                        </div>
                    </div>
                    <button id="playAgainBtn" class="btn btn-primary">再玩一次 🎮</button>
                </div>
            </div>
        </main>

        <!-- 游戏说明 -->
        <footer class="game-footer">
            <div class="instructions">
                <p>🖱️ 点击地面移动猫咪 | 🔢 解答数学题 | 🔤 认识字母 | 🎯 收集星星</p>
            </div>
        </footer>
    </div>

    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-modal-content">
            <h2 id="auth-title">登录</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="text" id="auth-username" placeholder="用户名">
            <input type="password" id="auth-password" placeholder="密码">
            <button class="btn btn-primary" id="auth-submit">登录</button>
            <div class="auth-switch">
                <span id="auth-switch-text">还没有账号？</span> <a id="auth-switch-link">立即注册</a>
            </div>
        </div>
    </div>

    <script src="cat.js"></script>
    <script>
        initGame_();
        
        function updateAuthUI() {
            const status = document.getElementById('auth-status');
            if (window.auth.currentUser) {
                status.innerHTML = '<div class="user-info"><span class="username">' + window.auth.currentUser.username + '</span><button class="btn-logout" onclick="window.auth.logout(); updateAuthUI();">退出登录</button></div>';
            } else {
                status.innerHTML = '<button class="btn btn-primary" onclick="showAuthModal(\'login\')">登录 / 注册</button>';
            }
        }

        function showAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-title');
            const submit = document.getElementById('auth-submit');
            const switchText = document.getElementById('auth-switch-text');
            const switchLink = document.getElementById('auth-switch-link');
            const error = document.getElementById('auth-error');
            error.textContent = '';
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
            if (mode === 'login') {
                title.textContent = '登录';
                submit.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                switchLink.onclick = function() { showAuthModal('register'); };
            } else {
                title.textContent = '注册';
                submit.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                switchLink.onclick = function() { showAuthModal('login'); };
            }
            modal.classList.remove('hidden');
        }

        document.getElementById('auth-submit').onclick = async function() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const error = document.getElementById('auth-error');
            const title = document.getElementById('auth-title');
            if (!username || !password) {
                error.textContent = '请填写用户名和密码';
                return;
            }
            let data;
            if (title.textContent === '登录') {
                data = await window.auth.login(username, password);
            } else {
                data = await window.auth.register(username, password);
            }
            if (data.success) {
                document.getElementById('auth-modal').classList.add('hidden');
                updateAuthUI();
                loadGameProgress_();
            } else {
                error.textContent = data.message;
            }
        };

        document.getElementById('auth-modal').onclick = function(e) {
            if (e.target === this) this.classList.add('hidden');
        };

        updateAuthUI();
    </script>
</body>
</html>
