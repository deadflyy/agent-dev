<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂斗罗 - Contra</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script>
        let game = null;
        let gameProgress_ = null;
        const GAME_NAME = 'contra';
        let lastSaveTime = 0;

        async function loadGameProgress_() {
            if (!window.auth.getUserId()) return;
            gameProgress_ = new window.GameProgress(GAME_NAME);
            const saved = await gameProgress_.load();
            if (saved) {
                if (saved.level) game.level = saved.level;
                if (saved.score) game.score = saved.score;
                if (saved.lives) game.lives = saved.lives;
                game.updateUI();
            }
        }

        async function saveGameProgress_() {
            if (!window.auth.getUserId() || !gameProgress_ || !game) return;
            await gameProgress_.save({
                level: game.level,
                score: game.score,
                lives: game.lives
            });
        }

        function initGame_() {
            const script = document.createElement('script');
            script.src = 'contra.js';
            script.onload = () => {
                game = new ContraGame();
                loadGameProgress_();
                
                setInterval(() => {
                    if (game && game.gameState === 'playing' && window.auth.getUserId()) {
                        const now = Date.now();
                        if (now - lastSaveTime > 10000) {
                            saveGameProgress_();
                            lastSaveTime = now;
                        }
                    }
                }, 10000);

                const origStart = game.startGame.bind(game);
                game.startGame = function() {
                    origStart();
                    lastSaveTime = Date.now();
                };

                const origGameOver = game.gameOver.bind(game);
                game.gameOver = function() {
                    origGameOver();
                    if (window.auth.getUserId()) saveGameProgress_();
                };
            };
            document.body.appendChild(script);
        }
    </script>
</head>
<body>
    <div class="auth-bar">
        <div id="auth-status"></div>
    </div>
    <div class="game-container">
        <header class="game-header">
            <a href="index.html" class="back-link">← 返回</a>
            <h1>魂斗罗</h1>
            <div class="score-panel">
                <div class="score-item">
                    <span class="label">得分</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">生命</span>
                    <span class="value" id="lives">3</span>
                </div>
                <div class="score-item">
                    <span class="label">关卡</span>
                    <span class="value" id="level">1</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="game-area">
                <canvas id="gameCanvas"></canvas>
                <div class="game-overlay" id="gameOverlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">游戏开始</h2>
                        <p id="overlayText">按空格键或点击按钮开始游戏</p>
                        <button class="btn btn-primary" id="startBtn">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="game-sidebar">
                <div class="controls-info">
                    <h3>操作说明</h3>
                    <div class="control-item">
                        <span class="key">WASD / 方向键</span>
                        <span>移动角色</span>
                    </div>
                    <div class="control-item">
                        <span class="key">K / Z</span>
                        <span>跳跃</span>
                    </div>
                    <div class="control-item">
                        <span class="key">J / X</span>
                        <span>射击</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span>暂停游戏</span>
                    </div>
                </div>

                <div class="game-rules">
                    <h3>游戏规则</h3>
                    <ul>
                        <li>消灭所有敌人前进</li>
                        <li>收集武器道具增强火力</li>
                        <li>避开陷阱和敌人攻击</li>
                        <li>到达关卡终点获胜</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-modal-content">
            <h2 id="auth-title">登录</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="text" id="auth-username" placeholder="用户名">
            <input type="password" id="auth-password" placeholder="密码">
            <button class="btn btn-primary" id="auth-submit">登录</button>
            <div class="auth-switch">
                <span id="auth-switch-text">还没有账号？</span> <a id="auth-switch-link">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        initGame_();
        
        function updateAuthUI() {
            const status = document.getElementById('auth-status');
            if (window.auth.currentUser) {
                status.innerHTML = '<div class="user-info"><span class="username">' + window.auth.currentUser.username + '</span><button class="btn-logout" onclick="window.auth.logout(); updateAuthUI();">退出登录</button></div>';
            } else {
                status.innerHTML = '<button class="btn btn-primary" onclick="showAuthModal(\'login\')">登录 / 注册</button>';
            }
        }

        function showAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-title');
            const submit = document.getElementById('auth-submit');
            const switchText = document.getElementById('auth-switch-text');
            const switchLink = document.getElementById('auth-switch-link');
            const error = document.getElementById('auth-error');
            error.textContent = '';
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
            if (mode === 'login') {
                title.textContent = '登录';
                submit.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                switchLink.onclick = function() { showAuthModal('register'); };
            } else {
                title.textContent = '注册';
                submit.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                switchLink.onclick = function() { showAuthModal('login'); };
            }
            modal.classList.remove('hidden');
        }

        document.getElementById('auth-submit').onclick = async function() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const error = document.getElementById('auth-error');
            const title = document.getElementById('auth-title');
            if (!username || !password) {
                error.textContent = '请填写用户名和密码';
                return;
            }
            let data;
            if (title.textContent === '登录') {
                data = await window.auth.login(username, password);
            } else {
                data = await window.auth.register(username, password);
            }
            if (data.success) {
                document.getElementById('auth-modal').classList.add('hidden');
                updateAuthUI();
                loadGameProgress_();
            } else {
                error.textContent = data.message;
            }
        };

        document.getElementById('auth-modal').onclick = function(e) {
            if (e.target === this) this.classList.add('hidden');
        };

        updateAuthUI();
    </script>
</body>
</html>
