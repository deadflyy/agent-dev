<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂划水大作战</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script>
        let game = null;
        let gameProgress_ = null;
        const GAME_NAME = 'slacking';
        let lastSaveTime = 0;

        async function loadGameProgress_() {
            if (!window.auth.getUserId()) return;
            gameProgress_ = new window.GameProgress(GAME_NAME);
            const saved = await gameProgress_.load();
            if (saved && game) {
                if (saved.score) {
                    document.getElementById('teacherScore').textContent = saved.score.teacher || 0;
                    document.getElementById('studentScore').textContent = saved.score.student || 0;
                }
            }
        }

        async function saveGameProgress_() {
            if (!window.auth.getUserId() || !gameProgress_ || !game) return;
            await gameProgress_.save({
                score: {
                    teacher: game.teacherScore || 0,
                    student: game.studentScore || 0
                },
                round: game.roundNum || 1
            });
        }

        function initGame_() {
            game = new SlackingGame();
            loadGameProgress_();
            
            setInterval(() => {
                if (game && game.gameState === 'playing' && window.auth.getUserId()) {
                    const now = Date.now();
                    if (now - lastSaveTime > 10000) {
                        saveGameProgress_();
                        lastSaveTime = now;
                    }
                }
            }, 10000);
        }
    </script>
</head>
<body>
    <div class="auth-bar">
        <div id="auth-status"></div>
    </div>
    <div class="game-container">
        <header class="game-header">
            <a href="index.html" class="back-link">← 返回</a>
            <h1>课堂划水大作战</h1>
            <div class="score-panel">
                <div class="score-item">
                    <span class="label">老师划水值</span>
                    <span class="value" id="teacherScore">0</span>
                </div>
                <div class="score-item">
                    <span class="label">学生划水值</span>
                    <span class="value" id="studentScore">0</span>
                </div>
                <div class="score-item">
                    <span class="label">回合</span>
                    <span class="value" id="roundNum">1/10</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="game-area">
                <canvas id="gameCanvas" style="max-width:100%; height:auto;"></canvas>
                <div class="game-overlay" id="gameOverlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">课堂划水大作战</h2>
                        <p id="overlayText">选择你的角色和难度，开始划水对决！</p>
                        <div class="role-select">
                            <button class="btn btn-primary" id="studentBtn">我是学生 👨‍🎓</button>
                            <button class="btn btn-primary" id="teacherBtn">我是老师 👨‍🏫</button>
                        </div>
                        <div class="difficulty-select" style="margin-top:18px; display:flex; gap:10px; justify-content:center;">
                            <button class="btn btn-diff" data-diff="easy" style="padding:6px 16px; border-radius:15px; border:2px solid #2ecc71; background:transparent; color:#2ecc71; cursor:pointer; font-size:0.85rem;">简单</button>
                            <button class="btn btn-diff active-diff" data-diff="normal" style="padding:6px 16px; border-radius:15px; border:2px solid #f39c12; background:#f39c12; color:#fff; cursor:pointer; font-size:0.85rem;">普通</button>
                            <button class="btn btn-diff" data-diff="hard" style="padding:6px 16px; border-radius:15px; border:2px solid #e74c3c; background:transparent; color:#e74c3c; cursor:pointer; font-size:0.85rem;">困难</button>
                        </div>
                    </div>
                </div>
                <div class="game-overlay hidden" id="resultOverlay">
                    <div class="overlay-content">
                        <h2 id="resultTitle">游戏结束</h2>
                        <p id="resultText"></p>
                        <button class="btn btn-primary" id="restartBtn">再来一局</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-modal-content">
            <h2 id="auth-title">登录</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="text" id="auth-username" placeholder="用户名">
            <input type="password" id="auth-password" placeholder="密码">
            <button class="btn btn-primary" id="auth-submit">登录</button>
            <div class="auth-switch">
                <span id="auth-switch-text">还没有账号？</span> <a id="auth-switch-link">立即注册</a>
            </div>
        </div>
    </div>

    <script src="slacking.js"></script>
    <script>
        initGame_();
        
        function updateAuthUI() {
            const status = document.getElementById('auth-status');
            if (window.auth.currentUser) {
                status.innerHTML = '<div class="user-info"><span class="username">' + window.auth.currentUser.username + '</span><button class="btn-logout" onclick="window.auth.logout(); updateAuthUI();">退出登录</button></div>';
            } else {
                status.innerHTML = '<button class="btn btn-primary" onclick="showAuthModal(\'login\')">登录 / 注册</button>';
            }
        }

        function showAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-title');
            const submit = document.getElementById('auth-submit');
            const switchText = document.getElementById('auth-switch-text');
            const switchLink = document.getElementById('auth-switch-link');
            const error = document.getElementById('auth-error');
            error.textContent = '';
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
            if (mode === 'login') {
                title.textContent = '登录';
                submit.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                switchLink.onclick = function() { showAuthModal('register'); };
            } else {
                title.textContent = '注册';
                submit.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                switchLink.onclick = function() { showAuthModal('login'); };
            }
            modal.classList.remove('hidden');
        }

        document.getElementById('auth-submit').onclick = async function() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const error = document.getElementById('auth-error');
            const title = document.getElementById('auth-title');
            if (!username || !password) {
                error.textContent = '请填写用户名和密码';
                return;
            }
            let data;
            if (title.textContent === '登录') {
                data = await window.auth.login(username, password);
            } else {
                data = await window.auth.register(username, password);
            }
            if (data.success) {
                document.getElementById('auth-modal').classList.add('hidden');
                updateAuthUI();
                loadGameProgress_();
            } else {
                error.textContent = data.message;
            }
        };

        document.getElementById('auth-modal').onclick = function(e) {
            if (e.target === this) this.classList.add('hidden');
        };

        updateAuthUI();
    </script>
</body>
</html>
