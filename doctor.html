<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>医生救小兔</title>
    <meta name="description" content="帮助医生收集药片，给小兔子看病，适合小朋友的益智游戏">
    <link rel="stylesheet" href="doctor.css">
</head>
<body>
    <div class="game-container">
        <!-- 游戏头部 -->
        <header class="game-header">
            <div class="header-left">
                <a href="index.html" class="back-btn">🏠</a>
                <h1>👨‍⚕️ 医生救小兔</h1>
            </div>
            <div class="header-right">
                <div class="pill-display">
                    <span class="pill-icon">💊</span>
                    <span id="pillCount">0</span>/<span id="pillsNeeded">3</span>
                </div>
                <div class="level-display">
                    <span>关卡</span>
                    <span id="level">1</span>
                </div>
            </div>
        </header>

        <!-- 游戏主区域 -->
        <main class="game-main">
            <!-- 开始界面 -->
            <div id="startScreen" class="screen start-screen">
                <div class="start-content">
                    <div class="rabbit-mascot">🐰</div>
                    <h2>医生救小兔</h2>
                    <p class="story">小兔子生病了，医生需要收集药片来治好它！</p>

                    <!-- 难度选择 -->
                    <div class="difficulty-selector">
                        <h3>选择难度</h3>
                        <div class="difficulty-options">
                            <button class="difficulty-btn" data-difficulty="easy">
                                <span class="difficulty-icon">🌱</span>
                                <span class="difficulty-name">简单</span>
                                <span class="difficulty-desc">适合初学者</span>
                            </button>
                            <button class="difficulty-btn active" data-difficulty="medium">
                                <span class="difficulty-icon">🌿</span>
                                <span class="difficulty-name">中等</span>
                                <span class="difficulty-desc">有挑战性</span>
                            </button>
                            <button class="difficulty-btn" data-difficulty="hard">
                                <span class="difficulty-icon">🌳</span>
                                <span class="difficulty-name">高阶</span>
                                <span class="difficulty-desc">大师级别</span>
                            </button>
                        </div>
                    </div>

                    <!-- 关卡选择 -->
                    <div class="level-selector">
                        <h3>选择关卡</h3>
                        <div id="levelGrid" class="level-grid">
                            <!-- 动态生成关卡按钮 -->
                        </div>
                    </div>

                    <div class="features">
                        <div class="feature">
                            <span class="feature-icon">💊</span>
                            <span>收集药片</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🔢</span>
                            <span>数学学习</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🔤</span>
                            <span>字母认知</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🎨</span>
                            <span>颜色配对</span>
                        </div>
                    </div>
                    <button id="startBtn" class="btn btn-primary">
                        <span class="btn-icon">▶️</span>
                        开始游戏
                    </button>
                </div>
            </div>

            <!-- 游戏画布 -->
            <div id="gameScreen" class="screen game-screen hidden">
                <canvas id="gameCanvas"></canvas>

                <!-- 游戏UI覆盖层 -->
                <div class="game-ui">
                    <div id="messageBox" class="message-box hidden">
                        <div class="message-content">
                            <span id="messageIcon">💝</span>
                            <p id="messageText">太棒了！</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 谜题弹窗 -->
            <div id="puzzleModal" class="puzzle-modal hidden">
                <div class="puzzle-content">
                    <div class="puzzle-header">
                        <span id="puzzleTypeIcon" class="puzzle-type-icon">🔢</span>
                        <h3>获得药片</h3>
                        <button id="closePuzzleBtn" class="close-btn">✕</button>
                    </div>
                    <div class="puzzle-body">
                        <div class="question-container">
                            <p id="puzzleQuestion" class="puzzle-question">1 + 2 = ?</p>
                            <button id="playAudioBtn" class="play-audio-btn" title="播放题目">
                                <span class="play-icon">🔊</span>
                                <span class="play-text">播放</span>
                            </button>
                        </div>
                        <div id="puzzleOptions" class="puzzle-options">
                            <button class="answer-option" data-answer="2">2</button>
                            <button class="answer-option" data-answer="3">3</button>
                            <button class="answer-option" data-answer="4">4</button>
                        </div>
                        <div id="hintText" class="hint-text hidden"></div>
                    </div>
                    <div class="puzzle-footer">
                        <button id="hintBtn" class="btn btn-hint">💡 提示</button>
                    </div>
                </div>
            </div>

            <!-- 关卡完成界面 -->
            <div id="levelCompleteScreen" class="screen level-complete-screen hidden">
                <div class="complete-content">
                    <div class="celebration">
                        <span class="celebration-emoji">🎉</span>
                        <span class="celebration-emoji">🐰</span>
                        <span class="celebration-emoji">💊</span>
                    </div>
                    <h2>关卡完成！</h2>
                    <div class="rabbit-healed">
                        <span class="healed-rabbit">🐰</span>
                        <span class="healed-text">小兔子感觉好多了！</span>
                    </div>
                    <p class="encouragement">你真棒！医生收集到了足够的药片！</p>
                    <div class="complete-buttons">
                        <button id="nextLevelBtn" class="btn btn-primary">下一关 ▶️</button>
                        <button id="replayBtn" class="btn btn-secondary">再玩一次 🔄</button>
                    </div>
                </div>
            </div>

            <!-- 游戏完成界面 -->
            <div id="gameCompleteScreen" class="screen game-complete-screen hidden">
                <div class="complete-content">
                    <div class="rabbit-family">
                        <span class="family-rabbit">🐰</span>
                        <span class="family-rabbit">🐰</span>
                        <span class="family-rabbit">🐰</span>
                    </div>
                    <h2>恭喜通关！</h2>
                    <p class="story">小兔子完全康复了！医生太厉害了！</p>
                    <div class="final-stats">
                        <div class="stat-item">
                            <span class="stat-label">收集药片</span>
                            <span id="totalPills" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">救治兔子</span>
                            <span id="healedRabbits" class="stat-value">0</span>
                        </div>
                    </div>
                    <button id="playAgainBtn" class="btn btn-primary">再玩一次 🎮</button>
                </div>
            </div>
        </main>

        <!-- 游戏说明 -->
        <footer class="game-footer">
            <div class="instructions">
                <p>🖱️ 点击地面移动医生 | 💊 收集药片 | 🔢 解答题目获得药片 | 🐰 救治小兔子</p>
            </div>
        </footer>
    </div>

    <script src="doctor.js"></script>
</body>
</html>
