<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典游戏合集</title>
    <meta name="description" content="在线经典小游戏合集：坦克大战、魂斗罗、课堂划水大作战">
    <meta property="og:title" content="经典游戏合集">
    <meta property="og:description" content="在线畅玩坦克大战、魂斗罗、课堂划水大作战等经典小游戏">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
<script src="auth.js"></script>
</head>
<body>
    <div class="auth-bar">
        <div id="auth-status"></div>
    </div>
    <div class="game-selector">
        <header class="selector-header">
            <h1>经典游戏合集</h1>
            <p>选择你想玩的游戏</p>
        </header>

        <main class="games-grid">
            <a href="tank.html" target="_self" class="game-card">
                <div class="game-icon">🎮</div>
                <h2>坦克大战</h2>
                <p>经典红白机坦克对战游戏，保护基地，消灭敌军</p>
                <div class="game-tags">
                    <span class="tag">射击</span>
                    <span class="tag">策略</span>
                </div>
            </a>

            <a href="contra.html" target="_self" class="game-card">
                <div class="game-icon">🔫</div>
                <h2>魂斗罗</h2>
                <p>经典横版射击游戏，勇闯敌营，拯救世界</p>
                <div class="game-tags">
                    <span class="tag">动作</span>
                    <span class="tag">射击</span>
                </div>
            </a>

            <a href="slacking.html" target="_self" class="game-card">
                <div class="game-icon">😴</div>
                <h2>课堂划水游戏</h2>
                <p>老师与学生之间的博弈，看谁能更胜一筹</p>
                <div class="game-tags">
                    <span class="tag">休闲</span>
                    <span class="tag">策略</span>
                </div>
            </a>

            <a href="cat.html" target="_self" class="game-card">
                <div class="game-icon">🐱</div>
                <h2>小猫回家</h2>
                <p>每次游戏都不同！学习数学、英语字母、认识汉字，寓教于乐</p>
                <div class="game-tags">
                    <span class="tag">数学</span>
                    <span class="tag">英语</span>
                    <span class="tag">汉字</span>
                    <span class="tag">益智</span>
                </div>
            </a>

            <a href="doctor.html" target="_self" class="game-card">
                <div class="game-icon">👨‍⚕️</div>
                <h2>医生救小兔</h2>
                <p>帮助医生收集药片救治生病的小兔子！数学、颜色、字母、汉字大挑战</p>
                <div class="game-tags">
                    <span class="tag">数学</span>
                    <span class="tag">颜色</span>
                    <span class="tag">英语</span>
                    <span class="tag">汉字</span>
                    <span class="tag">益智</span>
                </div>
            </a>
        </main>

        <footer class="selector-footer">
            <p>更多游戏敬请期待...</p>
        </footer>
    </div>
    
    <div id="auth-modal" class="auth-modal hidden">
        <div class="auth-modal-content">
            <h2 id="auth-title">登录</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="text" id="auth-username" placeholder="用户名">
            <input type="password" id="auth-password" placeholder="密码">
            <button class="btn btn-primary" id="auth-submit">登录</button>
            <div class="auth-switch">
                <span id="auth-switch-text">还没有账号？</span> <a id="auth-switch-link">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        function updateAuthUI() {
            const status = document.getElementById('auth-status');
            if (window.auth.currentUser) {
                status.innerHTML = '<div class="user-info"><span class="username">' + window.auth.currentUser.username + '</span><button class="btn-logout" onclick="window.auth.logout(); updateAuthUI();">退出登录</button></div>';
            } else {
                status.innerHTML = '<button class="btn btn-primary" onclick="showAuthModal(\'login\')">登录 / 注册</button>';
            }
        }

        function showAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-title');
            const submit = document.getElementById('auth-submit');
            const switchText = document.getElementById('auth-switch-text');
            const switchLink = document.getElementById('auth-switch-link');
            const error = document.getElementById('auth-error');
            
            error.textContent = '';
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
            
            if (mode === 'login') {
                title.textContent = '登录';
                submit.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                switchLink.onclick = function() { showAuthModal('register'); };
            } else {
                title.textContent = '注册';
                submit.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
                switchLink.onclick = function() { showAuthModal('login'); };
            }
            
            modal.classList.remove('hidden');
        }

        document.getElementById('auth-submit').onclick = async function() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const error = document.getElementById('auth-error');
            const title = document.getElementById('auth-title');
            
            if (!username || !password) {
                error.textContent = '请填写用户名和密码';
                return;
            }
            
            let data;
            if (title.textContent === '登录') {
                data = await window.auth.login(username, password);
            } else {
                data = await window.auth.register(username, password);
            }
            
            if (data.success) {
                document.getElementById('auth-modal').classList.add('hidden');
                updateAuthUI();
            } else {
                error.textContent = data.message;
            }
        };

        document.getElementById('auth-modal').onclick = function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        };

        updateAuthUI();
    </script>
</body>
</html>
