<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典游戏合集</title>
    <meta name="description" content="在线经典小游戏合集：坦克大战、魂斗罗、课堂划水大作战">
    <meta property="og:title" content="经典游戏合集">
    <meta property="og:description" content="在线畅玩坦克大战、魂斗罗、课堂划水大作战等经典小游戏">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-selector">
        <header class="selector-header">
            <h1>经典游戏合集</h1>
            <p>选择你想玩的游戏</p>
        </header>

        <main class="games-grid">
            <a href="tank.html" class="game-card">
                <div class="game-icon">🎮</div>
                <h2>坦克大战</h2>
                <p>经典红白机坦克对战游戏，保护基地，消灭敌军</p>
                <div class="game-tags">
                    <span class="tag">射击</span>
                    <span class="tag">策略</span>
                </div>
            </a>

            <a href="contra.html" class="game-card">
                <div class="game-icon">🔫</div>
                <h2>魂斗罗</h2>
                <p>经典横版射击游戏，勇闯敌营，拯救世界</p>
                <div class="game-tags">
                    <span class="tag">动作</span>
                    <span class="tag">射击</span>
                </div>
            </a>

            <a href="slacking.html" class="game-card">
                <div class="game-icon">😴</div>
                <h2>课堂划水大作战</h2>
                <p>老师与学生之间的博弈，看谁能更胜一筹</p>
                <div class="game-tags">
                    <span class="tag">休闲</span>
                    <span class="tag">策略</span>
                </div>
            </a>

            <a href="cat.html" class="game-card">
                <div class="game-icon">🐱</div>
                <h2>猫咪找家大冒险</h2>
                <p>每次游戏都不同！学习数学、英语字母、认识汉字，寓教于乐</p>
                <div class="game-tags">
                    <span class="tag">数学</span>
                    <span class="tag">英语</span>
                    <span class="tag">汉字</span>
                    <span class="tag">益智</span>
                </div>
            </a>

            <a href="doctor.html" class="game-card">
                <div class="game-icon">👨‍⚕️</div>
                <h2>医生救小兔</h2>
                <p>帮助医生收集药片救治生病的小兔子！数学、颜色、字母、汉字大挑战</p>
                <div class="game-tags">
                    <span class="tag">数学</span>
                    <span class="tag">颜色</span>
                    <span class="tag">英语</span>
                    <span class="tag">汉字</span>
                    <span class="tag">益智</span>
                </div>
            </a>
        </main>

        <footer class="selector-footer">
            <p>更多游戏敬请期待...</p>
        </footer>
    </div>
</body>
</html>
