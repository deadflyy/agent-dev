<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Tree trunk -->
  <rect x="55" y="70" width="18" height="50" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <!-- Trunk texture -->
  <path d="M60,75 Q58,85 62,95" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
  <path d="M68,80 Q66,90 70,100" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
  <!-- Tree crown (bottom layer) -->
  <ellipse cx="64" cy="55" rx="45" ry="30" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <!-- Tree crown (middle layer) -->
  <ellipse cx="64" cy="45" rx="38" ry="25" fill="#66BB6A" stroke="#388E3C" stroke-width="2"/>
  <!-- Tree crown (top layer) -->
  <ellipse cx="64" cy="35" rx="30" ry="20" fill="#81C784" stroke="#43A047" stroke-width="2"/>
  <!-- Tree crown highlight -->
  <ellipse cx="55" cy="30" rx="12" ry="8" fill="#A5D6A7" opacity="0.6"/>
  <!-- Apples -->
  <circle cx="45" cy="50" r="5" fill="#F44336" stroke="#D32F2F" stroke-width="1"/>
  <circle cx="80" cy="45" r="5" fill="#F44336" stroke="#D32F2F" stroke-width="1"/>
  <circle cx="60" cy="60" r="4" fill="#F44336" stroke="#D32F2F" stroke-width="1"/>
  <!-- Roots -->
  <path d="M55,118 Q40,115 35,120" fill="none" stroke="#5D4037" stroke-width="3"/>
  <path d="M73,118 Q88,115 93,120" fill="none" stroke="#5D4037" stroke-width="3"/>
</svg>