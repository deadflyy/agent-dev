<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 80">
  <defs>
    <radialGradient id="cloudGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </radialGradient>
    <filter id="cloudShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Cloud shape -->
  <g filter="url(#cloudShadow)">
    <circle cx="40" cy="40" r="25" fill="url(#cloudGradient)" stroke="#BBDEFB" stroke-width="1"/>
    <circle cx="65" cy="35" r="28" fill="url(#cloudGradient)" stroke="#BBDEFB" stroke-width="1"/>
    <circle cx="90" cy="40" r="22" fill="url(#cloudGradient)" stroke="#BBDEFB" stroke-width="1"/>
    <circle cx="55" cy="50" r="20" fill="url(#cloudGradient)" stroke="#BBDEFB" stroke-width="1"/>
    <circle cx="75" cy="48" r="18" fill="url(#cloudGradient)" stroke="#BBDEFB" stroke-width="1"/>
    <!-- Cloud highlight -->
    <circle cx="55" cy="30" r="12" fill="white" opacity="0.6"/>
    <circle cx="70" cy="28" r="10" fill="white" opacity="0.5"/>
  </g>
</svg>