<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 80">
  <!-- Grass -->
  <rect x="0" y="60" width="128" height="20" fill="#4CAF50" rx="5"/>
  <!-- Flower 1 (red) -->
  <line x1="25" y1="60" x2="25" y2="35" stroke="#388E3C" stroke-width="3"/>
  <circle cx="25" cy="30" r="8" fill="#F44336"/>
  <circle cx="25" cy="30" r="4" fill="#FFEB3B"/>
  <ellipse cx="25" cy="50" rx="8" ry="4" fill="#66BB6A"/>
  <!-- Flower 2 (pink) -->
  <line x1="50" y1="60" x2="50" y2="30" stroke="#388E3C" stroke-width="3"/>
  <circle cx="50" cy="25" r="10" fill="#E91E63"/>
  <circle cx="50" cy="25" r="5" fill="#FFEB3B"/>
  <ellipse cx="50" cy="45" rx="10" ry="5" fill="#66BB6A"/>
  <!-- Flower 3 (blue) -->
  <line x1="75" y1="60" x2="75" y2="38" stroke="#388E3C" stroke-width="3"/>
  <circle cx="75" cy="33" r="7" fill="#2196F3"/>
  <circle cx="75" cy="33" r="3.5" fill="#FFEB3B"/>
  <ellipse cx="75" cy="52" rx="7" ry="3.5" fill="#66BB6A"/>
  <!-- Flower 4 (yellow) -->
  <line x1="100" y1="60" x2="100" y2="42" stroke="#388E3C" stroke-width="3"/>
  <circle cx="100" cy="37" r="6" fill="#FFEB3B"/>
  <circle cx="100" cy="37" r="3" fill="#FF9800"/>
  <ellipse cx="100" cy="54" rx="6" ry="3" fill="#66BB6A"/>
  <!-- Butterflies -->
  <path d="M40,20 Q35,15 30,20 Q35,25 40,20" fill="#FF9800" opacity="0.8"/>
  <path d="M40,20 Q45,15 50,20 Q45,25 40,20" fill="#FF9800" opacity="0.8"/>
  <path d="M85,15 Q80,10 75,15 Q80,20 85,15" fill="#E91E63" opacity="0.8"/>
  <path d="M85,15 Q90,10 95,15 Q90,20 85,15" fill="#E91E63" opacity="0.8"/>
</svg>