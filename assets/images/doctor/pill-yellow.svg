<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="yellowPill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="50%" stop-color="#FFEA00"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <!-- Pill body -->
  <ellipse cx="32" cy="32" rx="24" ry="12" fill="url(#yellowPill)" stroke="#E65100" stroke-width="2" transform="rotate(-30 32 32)"/>
  <!-- Pill highlight -->
  <ellipse cx="28" cy="28" rx="8" ry="4" fill="white" opacity="0.4" transform="rotate(-30 28 28)"/>
  <!-- Pill cap -->
  <ellipse cx="18" cy="40" rx="12" ry="10" fill="#FFFF8D" stroke="#F9A825" stroke-width="2" transform="rotate(-30 18 40)"/>
  <!-- Pill cap highlight -->
  <ellipse cx="15" cy="37" rx="4" ry="3" fill="white" opacity="0.3" transform="rotate(-30 15 37)"/>
</svg>