<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Head -->
  <circle cx="64" cy="35" r="25" fill="#FFD4B8" stroke="#E6B899" stroke-width="2"/>
  <!-- Hair -->
  <path d="M40,30 Q45,10 64,15 Q83,10 88,30" fill="#8B4513"/>
  <!-- Eyes -->
  <ellipse cx="54" cy="35" rx="4" ry="5" fill="white"/>
  <ellipse cx="74" cy="35" rx="4" ry="5" fill="white"/>
  <circle cx="55" cy="36" r="2.5" fill="#333"/>
  <circle cx="75" cy="36" r="2.5" fill="#333"/>
  <circle cx="56" cy="34" r="1" fill="white"/>
  <circle cx="76" cy="34" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="64" cy="42" rx="3" ry="2" fill="#E6B899"/>
  <!-- Mouth -->
  <path d="M58,48 Q64,54 70,48" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Body (White coat) -->
  <rect x="42" y="60" width="44" height="50" rx="5" fill="white" stroke="#DDD" stroke-width="2"/>
  <!-- Coat lapels -->
  <path d="M55,60 L64,80 L73,60" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
  <!-- Stethoscope -->
  <path d="M50,65 Q45,80 55,90" fill="none" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  <circle cx="55" cy="92" r="5" fill="#666" stroke="#555" stroke-width="1"/>
  <circle cx="55" cy="92" r="2" fill="#888"/>
  <!-- Arms -->
  <rect x="30" y="65" width="12" height="35" rx="6" fill="white" stroke="#DDD" stroke-width="2"/>
  <rect x="86" y="65" width="12" height="35" rx="6" fill="white" stroke="#DDD" stroke-width="2"/>
  <!-- Legs -->
  <rect x="48" y="108" width="12" height="15" rx="3" fill="#333"/>
  <rect x="68" y="108" width="12" height="15" rx="3" fill="#333"/>
  <!-- Red cross on coat -->
  <rect x="60" y="68" width="8" height="2" fill="#F44336"/>
  <rect x="63" y="65" width="2" height="8" fill="#F44336"/>
</svg>