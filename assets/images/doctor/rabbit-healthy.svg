<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="rabbitBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </radialGradient>
  </defs>
  <!-- Ears -->
  <ellipse cx="48" cy="20" rx="10" ry="30" fill="white" stroke="#DDD" stroke-width="2"/>
  <ellipse cx="48" cy="20" rx="5" ry="20" fill="#FFB6C1"/>
  <ellipse cx="80" cy="20" rx="10" ry="30" fill="white" stroke="#DDD" stroke-width="2"/>
  <ellipse cx="80" cy="20" rx="5" ry="20" fill="#FFB6C1"/>
  <!-- Head -->
  <circle cx="64" cy="55" r="28" fill="url(#rabbitBody)" stroke="#DDD" stroke-width="2"/>
  <!-- Eyes -->
  <ellipse cx="54" cy="50" rx="5" ry="6" fill="white"/>
  <ellipse cx="74" cy="50" rx="5" ry="6" fill="white"/>
  <circle cx="55" cy="51" r="3" fill="#333"/>
  <circle cx="75" cy="51" r="3" fill="#333"/>
  <circle cx="56" cy="49" r="1.5" fill="white"/>
  <circle cx="76" cy="49" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="64" cy="60" rx="4" ry="3" fill="#FF69B4"/>
  <!-- Mouth -->
  <path d="M58,64 Q64,70 70,64" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Cheeks -->
  <circle cx="45" cy="58" r="6" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="83" cy="58" r="6" fill="#FFB6C1" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="64" cy="95" rx="30" ry="25" fill="url(#rabbitBody)" stroke="#DDD" stroke-width="2"/>
  <!-- Arms -->
  <ellipse cx="38" cy="90" rx="8" ry="15" fill="white" stroke="#DDD" stroke-width="2"/>
  <ellipse cx="90" cy="90" rx="8" ry="15" fill="white" stroke="#DDD" stroke-width="2"/>
  <!-- Legs -->
  <ellipse cx="50" cy="118" rx="12" ry="8" fill="white" stroke="#DDD" stroke-width="2"/>
  <ellipse cx="78" cy="118" rx="12" ry="8" fill="white" stroke="#DDD" stroke-width="2"/>
  <!-- Healthy indicator - green sparkle -->
  <circle cx="95" cy="25" r="4" fill="#4CAF50"/>
  <path d="M95,20 L97,25 L95,23 L93,25 Z" fill="white"/>
</svg>