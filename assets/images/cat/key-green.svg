<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Key head (ring) -->
  <circle cx="20" cy="20" r="14" fill="none" stroke="#4CAF50" stroke-width="6"/>
  <circle cx="20" cy="20" r="6" fill="#4CAF50"/>
  <!-- Key shaft -->
  <rect x="30" y="17" width="28" height="6" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <!-- Key teeth -->
  <rect x="50" y="23" width="4" height="8" rx="1" fill="#4CAF50"/>
  <rect x="44" y="23" width="4" height="6" rx="1" fill="#4CAF50"/>
  <rect x="38" y="23" width="4" height="10" rx="1" fill="#4CAF50"/>
  <!-- Key ring detail -->
  <circle cx="20" cy="20" r="10" fill="none" stroke="#66BB6A" stroke-width="2"/>
</svg>