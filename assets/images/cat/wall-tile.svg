  <path d="M40,48 Q44,56 40,64" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <!-- Leaves -->
  <ellipse cx="10" cy="4" rx="3" ry="2" fill="#66BB6A" transform="rotate(-30 10 4)"/>
  <ellipse cx="42" cy="20" rx="3" ry="2" fill="#66BB6A" transform="rotate(-30 42 20)"/>
