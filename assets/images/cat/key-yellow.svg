  <circle cx="20" cy="20" r="6" fill="#FFEB3B"/>
  <!-- Key shaft -->
  <rect x="30" y="17" width="28" height="6" rx="1" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <!-- Key teeth -->
  <rect x="50" y="23" width="4" height="8" rx="1" fill="#FFEB3B"/>
  <rect x="44" y="23" width="4" height="6" rx="1" fill="#FFEB3B"/>
  <rect x="38" y="23" width="4" height="10" rx="1" fill="#FFEB3B"/>
