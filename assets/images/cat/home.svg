  <polygon points="64,15 20,52 108,52" fill="#EF5350"/>
  <!-- Chimney -->
  <rect x="85" y="15" width="12" height="25" fill="#795548" stroke="#5D4037" stroke-width="1"/>
  <rect x="83" y="12" width="16" height="5" rx="1" fill="#8D6E63"/>
  <!-- House body -->
  <rect x="18" y="55" width="92" height="60" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
  <!-- Door -->
  <rect x="50" y="75" width="28" height="40" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <circle cx="72" cy="98" r="3" fill="#FFC107"/>
  <!-- Window left -->
  <rect x="28" y="65" width="18" height="18" rx="2" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
  <line x1="37" y1="65" x2="37" y2="83" stroke="#5D4037" stroke-width="1"/>
  <line x1="28" y1="74" x2="46" y2="74" stroke="#5D4037" stroke-width="1"/>
  <!-- Window right -->
  <rect x="82" y="65" width="18" height="18" rx="2" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
  <line x1="91" y1="65" x2="91" y2="83" stroke="#5D4037" stroke-width="1"/>
  <line x1="82" y1="74" x2="100" y2="74" stroke="#5D4037" stroke-width="1"/>
  <!-- Door step -->
  <rect x="45" y="113" width="38" height="5" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Fence -->
  <rect x="5" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="15" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="25" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="3" y="105" width="27" height="3" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="100" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="110" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="120" y="100" width="3" height="20" fill="white" stroke="#DDD" stroke-width="1"/>
  <rect x="98" y="105" width="27" height="3" fill="white" stroke="#DDD" stroke-width="1"/>
