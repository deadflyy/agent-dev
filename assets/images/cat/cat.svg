<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="catBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </radialGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="64" cy="85" rx="35" ry="30" fill="url(#catBody)" stroke="#E67300" stroke-width="2"/>
  <!-- Head -->
  <circle cx="64" cy="45" r="30" fill="url(#catBody)" stroke="#E67300" stroke-width="2"/>
  <!-- Left Ear -->
  <polygon points="38,25 28,5 48,15" fill="#FFB347" stroke="#E67300" stroke-width="2"/>
  <polygon points="40,22 33,10 47,17" fill="#FFCC99"/>
  <!-- Right Ear -->
  <polygon points="90,25 100,5 80,15" fill="#FFB347" stroke="#E67300" stroke-width="2"/>
  <polygon points="88,22 95,10 81,17" fill="#FFCC99"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="42" rx="8" ry="10" fill="white"/>
  <ellipse cx="76" cy="42" rx="8" ry="10" fill="white"/>
  <ellipse cx="54" cy="44" rx="5" ry="6" fill="#333"/>
  <ellipse cx="78" cy="44" rx="5" ry="6" fill="#333"/>
  <circle cx="56" cy="41" r="2" fill="white"/>
  <circle cx="80" cy="41" r="2" fill="white"/>
  <!-- Nose -->
  <polygon points="64,52 60,56 68,56" fill="#FF6B9D"/>
  <!-- Mouth -->
  <path d="M60,58 Q64,64 68,58" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Whiskers -->
  <line x1="40" y1="50" x2="20" y2="48" stroke="#333" stroke-width="1"/>
  <line x1="40" y1="54" x2="20" y2="56" stroke="#333" stroke-width="1"/>
  <line x1="88" y1="50" x2="108" y2="48" stroke="#333" stroke-width="1"/>
  <line x1="88" y1="54" x2="108" y2="56" stroke="#333" stroke-width="1"/>
  <!-- Tail -->
  <path d="M30,85 Q10,70 20,50" fill="none" stroke="#FFB347" stroke-width="8" stroke-linecap="round"/>
</svg>